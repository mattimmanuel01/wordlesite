<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle — Word Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      line-height: 1.6;
    }
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .hero .subtitle {
      font-size: 20px;
      color: #888;
      margin-bottom: 12px;
    }
    .hero .no-ads {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #538d4e;
      border: 1px solid #538d4e;
      border-radius: 20px;
      padding: 6px 16px;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .app-store-btn {
      display: inline-block;
      background: #ffffff;
      color: #000000;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    .app-store-btn:hover { opacity: 0.85; }

    .screenshots {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding: 40px 20px;
      max-width: 1400px;
      margin: 0 auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .screenshots::-webkit-scrollbar { display: none; }
    .screenshots img {
      width: 280px;
      border-radius: 16px;
      flex-shrink: 0;
      scroll-snap-align: center;
    }

    .section {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }
    .section h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .section p {
      color: #888;
      font-size: 16px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid #1a1a1a;
      color: #555;
      font-size: 14px;
    }
    footer a {
      color: #888;
      text-decoration: none;
      margin: 0 12px;
    }
    footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Wordle</h1>
    <p class="subtitle">Classic word puzzle. 1,700+ levels to master.</p>
    <p class="no-ads">FOREVER FREE. ZERO ADS.</p>
    <!-- Replace # with your App Store link after approval -->
    <a href="#" class="app-store-btn">Download on the App Store</a>
  </div>

  <div class="screenshots">
    <img src="screenshots/1.png" alt="How to Play">
    <img src="screenshots/2.png" alt="Gameplay with colored tiles">
    <img src="screenshots/3.png" alt="Win celebration with confetti">
    <img src="screenshots/4.png" alt="Dark and light mode">
    <img src="screenshots/5.png" alt="Statistics and streak tracking">
  </div>

  <div class="section">
    <h2>No ads. Ever.</h2>
    <p>No ads. No waiting. No interruptions. Just words.</p>
  </div>

  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a>
      <a href="support.html">Support</a>
    </p>
    <p style="margin-top: 12px;">&copy; 2026 Wordle</p>
  </footer>
</body>
</html>
